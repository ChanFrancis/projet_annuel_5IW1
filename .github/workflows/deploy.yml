name: Deploy

# Builds production images, pushes them to GitHub Container Registry,
# then SSHs into the VPS to pull + migrate + restart the stack.
#
# Required repository secrets:
#   VPS_HOST      e.g. copot.example.com (or the VPS IP)
#   VPS_USER      deploy user on the VPS (default: copot)
#   VPS_PORT      SSH port (default: 22)
#   VPS_SSH_KEY   private SSH key for the deploy user
#   GHCR_USER     GitHub username (or org) with package write access
#   GHCR_TOKEN    a PAT with write:packages
#
# Repository variables (Settings → Variables):
#   IMAGE_REGISTRY  e.g. ghcr.io/<owner>   (no trailing slash)

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute lowercase registry
        id: registry
        run: echo "name=ghcr.io/$(echo '${{ secrets.GHCR_USER }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USER }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set tags
        id: tags
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend/Dockerfile
          target: prod
          push: true
          tags: |
            ${{ steps.registry.outputs.name }}/copot-backend:latest
            ${{ steps.registry.outputs.name }}/copot-backend:${{ steps.tags.outputs.sha }}

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frontend/Dockerfile
          target: prod
          push: true
          # VITE_API_URL empty on purpose: resource paths in src/api/resources.ts
          # already start with "/api", so the base must be "" in prod (same-origin).
          # Setting "/api" here caused "/api/api/…" (double prefix) requests.
          # Matomo/Sentry: public values (they live in the client bundle anyway).
          build-args: |
            VITE_API_URL=
            VITE_MATOMO_URL=https://matomo.copot.fr
            VITE_MATOMO_SITE_ID=1
            VITE_SENTRY_LOADER_URL=https://js-de.sentry-cdn.com/a7ecc7e1c96167097fb8c32cc7c28161.min.js
          tags: |
            ${{ steps.registry.outputs.name }}/copot-frontend:latest
            ${{ steps.registry.outputs.name }}/copot-frontend:${{ steps.tags.outputs.sha }}

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT || 22 }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/copot
            git pull
            # Both compose files are required: the override adds Matomo + the
            # copot.fr routing labels. Without it, `--remove-orphans` kills Matomo
            # and the routers revert to the zap.cloud host only.
            docker compose -f docker-compose.prod.yml -f docker-compose.copot-public.prod.yml --env-file .env.prod --profile monitoring pull
            docker compose -f docker-compose.prod.yml -f docker-compose.copot-public.prod.yml --env-file .env.prod run --rm backend php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration
            docker compose -f docker-compose.prod.yml -f docker-compose.copot-public.prod.yml --env-file .env.prod --profile monitoring up -d --remove-orphans
