name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  backend:
    name: Backend (Symfony)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dev_user
          POSTGRES_PASSWORD: dev_password
          POSTGRES_DB: copot_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U dev_user"
          --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: intl, pdo_pgsql, redis, zip
          coverage: none
      - name: Install dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist
      - name: Generate JWT keys
        working-directory: backend
        run: |
          mkdir -p config/jwt
          openssl genrsa -passout pass:test -out config/jwt/private.pem -aes256 4096
          openssl rsa -passin pass:test -pubout -in config/jwt/private.pem -out config/jwt/public.pem
      - name: PHPStan
        working-directory: backend
        run: vendor/bin/phpstan analyse --no-progress || true
      - name: PHPUnit
        working-directory: backend
        env:
          DATABASE_URL: postgresql://dev_user:dev_password@localhost:5432/copot_test?serverVersion=16
          JWT_PASSPHRASE: test
        run: |
          php bin/console doctrine:migrations:migrate --no-interaction --env=test || true
          vendor/bin/phpunit

  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: frontend
        run: npm ci || npm install
      - name: Lint
        working-directory: frontend
        run: npm run lint || true
      - name: Type-check & build
        working-directory: frontend
        run: npm run build
      - name: Unit tests
        working-directory: frontend
        run: npm test || true

  docker:
    name: Build images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -f docker/backend/Dockerfile --target prod -t copot-backend:ci .
      - name: Build frontend image
        run: docker build -f docker/frontend/Dockerfile --target prod -t copot-frontend:ci .
