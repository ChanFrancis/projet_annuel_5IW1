---
# CoPot — VPS provisioning (Ubuntu 24.04).
#
# Run from infra/ansible/:
#   ansible-playbook -i inventory.local.yml playbook.yml --vault-password-file ~/.vault_pass
#
# Idempotent: safe to re-run. Creates the deploy user, installs Docker, opens
# only ports 22/80/443, deploys the compose stack, and registers backups cron.

- name: Provision CoPot VPS
  hosts: all
  become: true
  vars_files:
    - group_vars/all.yml
  tasks:

    # ---------- Base packages ----------
    - name: Update apt cache and upgrade packages
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist

    - name: Install base packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - ufw
          - unattended-upgrades
          - rsync
        state: present

    # ---------- Deploy user ----------
    - name: Ensure deploy group exists
      ansible.builtin.group:
        name: "{{ copot_deploy_user }}"
        state: present

    - name: Ensure deploy user exists
      ansible.builtin.user:
        name: "{{ copot_deploy_user }}"
        group: "{{ copot_deploy_user }}"
        groups: sudo,docker
        append: true
        shell: /bin/bash
        create_home: true

    - name: Authorized key for deploy user (used by CI to SSH in)
      ansible.posix.authorized_key:
        user: "{{ copot_deploy_user }}"
        state: present
        key: "{{ copot_deploy_public_key }}"

    # ---------- Docker ----------
    - name: Add Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'

    - name: Add Docker apt repo
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc]
          https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
        filename: docker
        state: present

    - name: Install Docker Engine + compose plugin
      ansible.builtin.apt:
        update_cache: true
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present

    - name: Ensure Docker is enabled and running
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    # ---------- Firewall (ports 22/80/443 only) ----------
    - name: Configure UFW defaults
      community.general.ufw:
        state: enabled
        policy: deny
        direction: incoming
        logging: on

    - name: Allow outgoing traffic
      community.general.ufw:
        direction: outgoing
        policy: allow

    - name: Allow SSH / HTTP / HTTPS
      community.general.ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop:
        - '22'
        - '80'
        - '443'

    # ---------- Application deployment ----------
    - name: Ensure deploy root exists
      ansible.builtin.file:
        path: "{{ copot_deploy_root }}"
        state: directory
        owner: "{{ copot_deploy_user }}"
        group: "{{ copot_deploy_user }}"
        mode: '0755'

    - name: Checkout repo (or update)
      ansible.builtin.git:
        repo: "{{ copot_repo_url }}"
        dest: "{{ copot_deploy_root }}"
        version: "{{ copot_repo_branch }}"
        force: true
      become_user: "{{ copot_deploy_user }}"

    - name: Log in to GHCR (so the VPS can pull private images)
      ansible.builtin.shell: |
        echo "{{ copot_ghcr_token }}" | docker login ghcr.io -u {{ copot_ghcr_user | default(copot_deploy_user) }} --password-stdin
      args:
        creates: /home/{{ copot_deploy_user }}/.docker/config.json
      become_user: "{{ copot_deploy_user }}"

    - name: Render backend/.env.prod.local
      ansible.builtin.template:
        src: env.prod.local.j2
        dest: "{{ copot_deploy_root }}/backend/.env.prod.local"
        owner: "{{ copot_deploy_user }}"
        group: "{{ copot_deploy_user }}"
        mode: '0600'

    - name: Render root .env.prod (domain + registry + ACME for compose)
      ansible.builtin.template:
        src: env.prod.j2
        dest: "{{ copot_deploy_root }}/.env.prod"
        owner: "{{ copot_deploy_user }}"
        group: "{{ copot_deploy_user }}"
        mode: '0600'

    - name: Pull images
      ansible.builtin.command: docker compose --env-file .env.prod -f docker-compose.prod.yml pull
      args:
        chdir: "{{ copot_deploy_root }}"
      become_user: "{{ copot_deploy_user }}"

    - name: Run pending database migrations
      ansible.builtin.command: >-
        docker compose --env-file .env.prod -f docker-compose.prod.yml run --rm backend
        php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration
      args:
        chdir: "{{ copot_deploy_root }}"
      become_user: "{{ copot_deploy_user }}"

    - name: Start the stack
      ansible.builtin.command: docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --remove-orphans
      args:
        chdir: "{{ copot_deploy_root }}"
      become_user: "{{ copot_deploy_user }}"

    # ---------- Backups cron ----------
    - name: Install rclone (for off-site B2 backup)
      ansible.builtin.apt:
        name: rclone
        state: present

    - name: Ensure local backup dir exists
      ansible.builtin.file:
        path: /var/backups/copot
        state: directory
        owner: "{{ copot_deploy_user }}"
        group: "{{ copot_deploy_user }}"
        mode: '0750'

    - name: Render rclone config
      ansible.builtin.template:
        src: rclone.conf.j2
        dest: "/home/{{ copot_deploy_user }}/.config/rclone/rclone.conf"
        owner: "{{ copot_deploy_user }}"
        group: "{{ copot_deploy_user }}"
        mode: '0600'

    - name: "Nightly backup cron (3-2-1: local + Backblaze B2)"
      ansible.builtin.cron:
        name: "copot nightly backup"
        hour: "3"
        minute: "17"
        user: "{{ copot_deploy_user }}"
        job: "{{ copot_deploy_root }}/infra/backups/backup.sh >> /var/log/copot-backup.log 2>&1"
