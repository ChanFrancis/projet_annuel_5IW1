# CoPot — production stack.
#
# Edge = Traefik (TLS termination + automatic Let's Encrypt).
# The SPA is built with an empty VITE_API_URL (resource paths already include
# "/api"), so same-origin requests are routed to the backend by the
# PathPrefix(`/api`) rule below.
#
# Usage:
#   cp backend/.env.prod.example backend/.env.prod.local   # fill real secrets
#   docker compose -f docker-compose.prod.yml up -d

name: copot-prod

services:
  traefik:
    image: traefik:v3.2
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      # Let's Encrypt — TLS-ALPN challenge.
      - --certificatesresolvers.le.acme.tlschallenge=true
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL:?ACME_EMAIL must be set}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --log.level=${TRAEFIK_LOG_LEVEL:-INFO}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    networks:
      - edge

  frontend:
    image: ${IMAGE_REGISTRY:?registry}/copot-frontend:latest
    restart: unless-stopped
    networks: [edge]
    labels:
      - traefik.enable=true
      - traefik.http.routers.copot-frontend.rule=Host(`${DOMAIN:?DOMAIN must be set}`)
      - traefik.http.routers.copot-frontend.entrypoints=websecure
      - traefik.http.routers.copot-frontend.tls=true
      - traefik.http.routers.copot-frontend.tls.certresolver=le
      - traefik.http.services.copot-frontend.loadbalancer.server.port=80
      # Redirect the plaintext host to HTTPS.
      - traefik.http.routers.copot-frontend-http.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.copot-frontend-http.entrypoints=web
      - traefik.http.routers.copot-frontend-http.middlewares=https-redirect@docker
      - traefik.http.middlewares.https-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.https-redirect.redirectscheme.permanent=true

  backend:
    image: ${IMAGE_REGISTRY:?registry}/copot-backend:latest
    restart: unless-stopped
    env_file: backend/.env.prod.local
    environment:
      APP_ENV: prod
      APP_DEBUG: 0
      DATABASE_URL: postgresql://${POSTGRES_USER:?user}:${POSTGRES_PASSWORD:?pass}@postgres:5432/${POSTGRES_DB:?db}?serverVersion=16&charset=utf8
      REDIS_URL: redis://redis:6379
    volumes:
      - jwt:/app/config/jwt
      - backend_var:/app/var
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [edge, internal]
    labels:
      - traefik.enable=true
      - traefik.http.routers.copot-backend.rule=Host(`${DOMAIN}`) && PathPrefix(`/api`)
      - traefik.http.routers.copot-backend.entrypoints=websecure
      - traefik.http.routers.copot-backend.tls=true
      - traefik.http.routers.copot-backend.tls.certresolver=le
      - traefik.http.services.copot-backend.loadbalancer.server.port=80

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?pass}
      POSTGRES_DB: ${POSTGRES_DB:?db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Deliberately NOT published — only reachable on the internal network.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

networks:
  edge:
  internal:
    internal: true

volumes:
  pgdata:
  redisdata:
  jwt:
  backend_var:
  letsencrypt:
