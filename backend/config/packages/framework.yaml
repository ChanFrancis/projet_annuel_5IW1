framework:
    secret: '%env(APP_SECRET)%'
    http_method_override: false
    handle_all_throwables: true

    session: false

    php_errors:
        log: true

    rate_limiter:
        # Limits password-reset / magic-link email requests per IP.
        password_forgot:
            policy: 'sliding_window'
            limit: 5
            interval: '15 minutes'

when@test:
    framework:
        test: true
