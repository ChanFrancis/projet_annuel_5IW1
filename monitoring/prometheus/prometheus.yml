global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # CoPot backend application metrics (Prometheus text exposition format).
  - job_name: copot-backend
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]
